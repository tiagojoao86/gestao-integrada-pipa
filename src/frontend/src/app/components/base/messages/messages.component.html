@if (show) {
  <div class="message" [class]="getClass()">
    <div class="text">
      @for (message of messages; track message) {
        <p>{{ message }}</p>
      }
    </div>
    <div class="button">
      <button pButton (click)="closeMessage()">
        <span class="material-icons">close</span>
      </button>
    </div>
  </div>
}
