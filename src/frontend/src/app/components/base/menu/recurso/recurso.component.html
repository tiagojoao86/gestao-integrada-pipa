@if (recurso) {
  <div
    class="recurso"
    (click)="goTo(recurso.url)"
    (keyup.enter)="goTo(recurso.url)"
    tabindex="0"
    >
    <i>
      <span class="material-icons" style="font-size: 2.5rem">{{
        recurso.icone
      }}</span>
    </i>
    <div class="nome" [ngClass]="getFontSizeClass()">
      {{ recurso.nome }}
    </div>
  </div>
}
