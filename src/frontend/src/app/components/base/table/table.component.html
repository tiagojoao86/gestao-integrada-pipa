<p-table
  [value]="data"
  [sortMode]="sortType"
  [resizableColumns]="true"
  (onSort)="sortChange($event.multisortmeta)"
  [lazy]="true"
>
  <ng-template #header>
    <tr>
      @for (col of columns; track col) {
      <th
        [pSortableColumn]="col.name"
        pResizableColumn
        [pSortableColumnDisabled]="!sortable"
      >
        <span class="header">{{ col.label }}</span>
        @if (sortable) {
        <p-sortIcon [field]="col.name" />
        }
      </th>
      } @if (actions) {
      <th i18n>Ações</th>
      }
    </tr>
  </ng-template>
  <ng-template #body let-rowData>
    <tr [ngClass]="{ 'deleted-row': isDeletedRow(rowData) }">
      @for (col of columns; track col) {
      <td>
        <div class="td-content">
          {{ col.getValue(rowData) }}
        </div>
      </td>
      } @if (actions) {
      <td>
        <div class="actions">
          @for (action of actions; track action) {
          <p-button (click)="action.action(rowData)" title="{{ action.title }}">
            <span
              [class]="
                (action.iconType || 'material-symbols-outlined') + ' table-icon'
              "
              >{{ action.icon }}</span
            >
          </p-button>
          }
        </div>
      </td>
      }
    </tr>
  </ng-template>
</p-table>
