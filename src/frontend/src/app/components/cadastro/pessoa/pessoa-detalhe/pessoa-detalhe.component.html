<gi-app-base
  [title]="titulo"
  [actions]="acoesTela"
  [goBackFn]="goBackFn.bind(this)"
>
  <div body-content>
    <div class="form" [formGroup]="form">
      <!-- Tipo de Pessoa -->
      <div class="tipo-pessoa-ativa">
        <div class="tipo-pessoa-selector w-80">
          <label for="tipoFisica" i18n>Tipo de Pessoa:</label>
          <div class="radio-group">
            <p-radioButton
              name="tipoPessoa"
              value="FISICA"
              formControlName="tipoPessoa"
              (onClick)="onTipoPessoaChange()"
              inputId="tipoFisica"
            />
            <label for="tipoFisica" i18n>Pessoa Física</label>
          </div>
          <div class="radio-group">
            <p-radioButton
              name="tipoPessoa"
              value="JURIDICA"
              formControlName="tipoPessoa"
              (onClick)="onTipoPessoaChange()"
              inputId="tipoJuridica"
            />
            <label for="tipoJuridica" i18n>Pessoa Jurídica</label>
          </div>
        </div>
        <div class="checkbox-field w-20">
          <p-checkbox
            formControlName="ativa"
            [binary]="true"
            inputId="ativaPessoa"
          />
          <label for="ativaPessoa" i18n>Ativa</label>
        </div>
      </div>

      <!-- Campos Comuns -->
      <div class="campos-comuns">
        <p-iftalabel class="w-33">
          <input pInputText id="nomePessoa" formControlName="nome" />
          <label for="nomePessoa" *ngIf="isFisica()" i18n>Nome</label>
          <label for="nomePessoa" *ngIf="isJuridica()" i18n
            >Nome Fantasia</label
          >
          <small *ngIf="isControlInvalid('nome')" i18n
            >Esse campo não pode ser em branco.</small
          >
        </p-iftalabel>

        <p-iftalabel class="w-33">
          <input pInputText id="emailPessoa" formControlName="email" />
          <label for="emailPessoa" i18n>E-mail</label>
          <small *ngIf="isControlInvalid('email')" i18n>E-mail inválido.</small>
        </p-iftalabel>

        <p-iftalabel class="w-33">
          <input pInputText id="telefonePessoa" formControlName="telefone" />
          <label for="telefonePessoa" i18n>Telefone</label>
          <small *ngIf="isControlInvalid('telefone')" i18n
            >Telefone inválido.</small
          >
        </p-iftalabel>
      </div>

      <!-- Campos Pessoa Física -->
      <div class="campos-fisica" *ngIf="isFisica()">
        <p-iftalabel class="w-33">
          <p-inputMask
            id="cpfPessoa"
            formControlName="cpf"
            mask="999.999.999-99"
          />
          <label for="cpfPessoa" i18n>CPF</label>
          <small *ngIf="isControlInvalid('cpf')" i18n>CPF inválido.</small>
        </p-iftalabel>

        <p-iftalabel class="w-33">
          <p-datepicker
            inputId="dataNascimentoPessoa"
            formControlName="dataNascimento"
            dateFormat="dd/mm/yy"
            [showIcon]="true"
          />
          <label for="dataNascimentoPessoa" i18n>Data de Nascimento</label>
          <small *ngIf="isControlInvalid('dataNascimento')" i18n
            >Data inválida.</small
          >
        </p-iftalabel>
      </div>

      <!-- Campos Pessoa Jurídica -->
      <div class="campos-juridica" *ngIf="isJuridica()">
        <p-iftalabel class="w-33">
          <p-inputMask
            id="cnpjPessoa"
            formControlName="cnpj"
            mask="99.999.999/9999-99"
          />
          <label for="cnpjPessoa" i18n>CNPJ</label>
          <small *ngIf="isControlInvalid('cnpj')" i18n>CNPJ inválido.</small>
        </p-iftalabel>

        <p-iftalabel class="w-33">
          <input
            pInputText
            id="inscricaoEstadual"
            formControlName="inscricaoEstadual"
          />
          <label for="inscricaoEstadual" i18n>Inscrição Estadual</label>
        </p-iftalabel>

        <p-iftalabel class="w-33">
          <input pInputText id="razaoSocial" formControlName="razaoSocial" />
          <label for="razaoSocial" i18n>Razão Social</label>
          <small *ngIf="isControlInvalid('razaoSocial')" i18n
            >Esse campo não pode ser em branco.</small
          >
        </p-iftalabel>
      </div>

      <!-- Observações -->
      <p-iftalabel class="w-100">
        <textarea
          pTextarea
          id="observacoesPessoa"
          formControlName="observacoes"
          rows="4"
        ></textarea>
        <label for="observacoesPessoa" i18n>Observações</label>
      </p-iftalabel>
    </div>
  </div>
</gi-app-base>
