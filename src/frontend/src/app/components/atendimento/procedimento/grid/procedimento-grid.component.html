<gi-app-base [title]="titulo" [actions]="toolbarActions" style="flex-grow: 1">
  <div body-content>
    <gi-filter-component
      [filters]="filtros"
      [hidden]="hideFilters"
      (filterEvent)="filter($event)"
      (cancelEvent)="closeFilter()"
    ></gi-filter-component>
    <gi-table-component
      [columns]="columns"
      [data]="rows"
      [actions]="tableActions"
      (sortingEvent)="sort($event)"
    ></gi-table-component>
    <div class="padrao-panel">
      <span class="padrao-label" i18n>Categoria de título padrão para atendimento:</span>
      <p-select
        [options]="categoriasReceita"
        [(ngModel)]="categoriaPadraoId"
        optionValue="id"
        [placeholder]="'Selecione uma categoria'"
        (onChange)="onCategoriaPadraoChange(categoriaPadraoId)"
      >
        <ng-template let-item pTemplate="selectedItem">
          <span>{{ item.codigo }} — {{ item.nome }}</span>
        </ng-template>
        <ng-template let-item pTemplate="item">
          <span>{{ item.codigo }} — {{ item.nome }}</span>
        </ng-template>
      </p-select>
    </div>
  </div>
  <div footer-content>
    @if (showAuditInfo && auditInfoData) {
      <gi-audit-info [auditData]="auditInfoData" (closeEvent)="closeAuditInfo()"></gi-audit-info>
    }
    <gi-pagination-component
      (paginationEvent)="paginate($event)"
      [itemsPerPage]="itensPorPagina"
      [totalElements]="totalElements"
    ></gi-pagination-component>
  </div>
</gi-app-base>
