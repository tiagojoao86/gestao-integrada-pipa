@if (viewMode === 'GRID') {
  <gi-atendimento-grid (openDetail)="openDetail($event)"></gi-atendimento-grid>
}
@if (viewMode === 'DETAIL') {
  <gi-atendimento-detalhe
    [detailId]="detailId"
    [preencherDeAgendamento]="preencherDeAgendamento"
    (closeDetail)="onAtendimentoSalvo($event)"
  ></gi-atendimento-detalhe>
}
