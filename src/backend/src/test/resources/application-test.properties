# Configurações de Teste
spring.application.name=gestao-integrada-test

# Datasource (será sobrescrito pelo Testcontainers dinamicamente)
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Flyway - migrations públicas primeiro, depois tenant
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=false
spring.flyway.locations=classpath:db/migration

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.testcontainers=INFO
logging.level.com.github.dockerjava=WARN

# Multi-tenancy - usa tenant de teste
app.multitenancy.default-schema=teste_tenant
app.multitenancy.tenant-header=X-TenantID

# Security - desabilita CSRF e habilita acesso total
spring.security.user.name=test
spring.security.user.password=test
